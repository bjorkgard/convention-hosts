name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest tag, or use 0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Calculate new version
        id: calculate_version
        run: |
          LATEST_TAG="${{ steps.get_latest_tag.outputs.latest_tag }}"
          VERSION_BUMP="${{ github.event.inputs.version_bump }}"
          
          # Remove 'v' prefix if present
          VERSION=${LATEST_TAG#v}
          
          # Split version into components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Increment based on bump type
          case $VERSION_BUMP in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update CHANGELOG.md
        run: |
          NEW_VERSION="${{ steps.calculate_version.outputs.new_version }}"
          RELEASE_DATE=$(date +"%Y-%m-%d")

          # Use Python to:
          # 1. Merge ALL [Unreleased] sections into a single versioned release entry
          # 2. Prepend a fresh empty [Unreleased] section at the top
          python3 - docs/CHANGELOG.md "$NEW_VERSION" "$RELEASE_DATE" << 'PYEOF'
          import sys, re

          changelog_file = sys.argv[1]
          new_version    = sys.argv[2]
          release_date   = sys.argv[3]

          SECTION_ORDER = ['Added', 'Changed', 'Deprecated', 'Removed', 'Fixed', 'Security', 'Other']

          with open(changelog_file) as f:
              content = f.read()

          # Collect all lines from every [Unreleased] section (any variant heading)
          unreleased_re = re.compile(r'^## \[Unreleased\][^\n]*\n', re.MULTILINE)
          collected = {s: [] for s in SECTION_ORDER}
          remaining = content

          for m in unreleased_re.finditer(content):
              body_start = m.end()
              next_sec   = re.search(r'^## \[', content[body_start:], re.MULTILINE)
              body_end   = body_start + next_sec.start() if next_sec else len(content)
              body       = content[body_start:body_end]

              current = None
              for line in body.splitlines():
                  sec_m = re.match(r'^### (.+)$', line)
                  if sec_m:
                      current = sec_m.group(1).strip()
                      if current not in collected:
                          current = None
                  elif line.startswith('- '):
                      key = current if current else 'Other'
                      if line not in collected[key]:
                          collected[key].append(line)

          # Build the new versioned release block
          release_block = f"## [{new_version}] - {release_date}\n\n"
          for section in SECTION_ORDER:
              if collected[section]:
                  release_block += f"### {section}\n\n"
                  release_block += '\n'.join(collected[section]) + "\n\n"

          # Strip ALL [Unreleased] sections from content
          def remove_unreleased(text):
              result = []
              lines  = text.splitlines(keepends=True)
              i = 0
              while i < len(lines):
                  if re.match(r'^## \[Unreleased\]', lines[i]):
                      i += 1
                      # Skip until next ## [ heading or end
                      while i < len(lines) and not re.match(r'^## \[', lines[i]):
                          i += 1
                  else:
                      result.append(lines[i])
                      i += 1
              return ''.join(result)

          stripped = remove_unreleased(content)

          # Find where versioned releases start in stripped content
          first_ver = re.search(r'^## \[', stripped, re.MULTILINE)
          if first_ver:
              insert_pos = first_ver.start()
          else:
              insert_pos = len(stripped)

          header   = stripped[:insert_pos].rstrip('\n') + '\n\n'
          tail     = stripped[insert_pos:]

          new_content = header + "## [Unreleased]\n\n" + release_block + tail

          with open(changelog_file, 'w') as f:
              f.write(new_content)

          print(f"Updated CHANGELOG.md with version {new_version}")
          PYEOF

      - name: Commit version bump
        run: |
          NEW_VERSION="${{ steps.calculate_version.outputs.new_version }}"
          
          # Create VERSION file for runtime version detection
          echo "$NEW_VERSION" > VERSION
          
          git add docs/CHANGELOG.md VERSION
          git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Create and push tag
        run: |
          NEW_VERSION="${{ steps.calculate_version.outputs.new_version }}"
          
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push origin "$NEW_VERSION"

      - name: Extract release notes
        id: extract_notes
        run: |
          NEW_VERSION="${{ steps.calculate_version.outputs.new_version }}"
          
          # Extract the section for this version from CHANGELOG.md
          # Matches from the version heading until the next ## heading, excluding both boundary lines
          RELEASE_NOTES=$(awk -v ver="$NEW_VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' docs/CHANGELOG.md | sed '/^$/d')
          
          # If no release notes found, use a default message
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Release $NEW_VERSION"
          fi
          
          # Save to file for multiline output
          echo "$RELEASE_NOTES" > release_notes.txt
          echo "Release notes extracted"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.calculate_version.outputs.new_version }}
          name: Release ${{ steps.calculate_version.outputs.new_version }}
          body_path: release_notes.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Laravel Cloud
        run: |
          curl -X POST "https://cloud.laravel.com/deploy/a13ca029-a1e9-4867-b534-5e7a5f274e16/AOSkCAzaGvlqEEzd"

      - name: Summary
        run: |
          NEW_VERSION="${{ steps.calculate_version.outputs.new_version }}"
          echo "### 🎉 Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $NEW_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** ${{ github.event.inputs.version_bump }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The release has been created and is now available on GitHub." >> $GITHUB_STEP_SUMMARY
